{% extends 'base.html' %}
{% block content %}

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      
      <!-- Header -->
      <div class="text-center mb-4">
        <div class="icon-circle bg-primary bg-opacity-10 d-inline-flex align-items-center justify-content-center mb-3">
          <i class="fas fa-graduation-cap fa-2x text-primary"></i>
        </div>
        <h2 class="fw-bold mb-2">Result Search Portal</h2>
        <p class="text-muted">Check your academic performance</p>
      </div>

      <!-- Messages -->
      {% if messages %}
        {% for m in messages %}
          <div class="alert alert-{% if m.tags == 'error' %}danger{% else %}{{m.tags}}{% endif %} alert-dismissible fade show border-0 shadow-sm mb-4" role="alert">
            {{ m }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}

      <!-- Search Form -->
      <div class="card border-light shadow-sm">
        <div class="card-header bg-light border-0 py-3">
          <h5 class="mb-0 text-center fw-medium">
            <i class="fas fa-search me-2 text-primary"></i>Enter Details
          </h5>
        </div>
        
        <div class="card-body p-4">
          <form method="post" action="{% url 'check_result' %}">
            {% csrf_token %}

            <!-- Roll Number -->
            <div class="mb-4">
              <label for="rollid" class="form-label fw-medium text-gray-700">
                <i class="fas fa-id-badge me-1 text-primary"></i>Roll Number
              </label>
              <input type="text" 
                     class="form-control form-control-lg" 
                     id="rollid" 
                     name="rollid"
                     placeholder="Enter your roll number" 
                     required>
            </div>

            <!-- Class Selection -->
            <div class="mb-4">
              <label for="class" class="form-label fw-medium text-gray-700">
                <i class="fas fa-chalkboard-teacher me-1 text-primary"></i>Class & Section
              </label>
              <select class="form-select form-select-lg" 
                      id="class" 
                      name="class" 
                      required>
                <option value="" selected disabled>Select your class</option>
                {% for i in classes %}
                  <option value="{{ i.id }}">
                    Class {{ i.name }} - Section {{ i.section }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <!-- Submit Button -->
            <div class="mt-4">
              <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold">
                <i class="fas fa-search me-2"></i>View Results
              </button>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<style>
  .card {
    border-radius: 10px;
  }
  
  .icon-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
  }
  
  .form-control:focus, .form-select:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
  }
  
  .btn-primary {
    transition: all 0.3s ease;
  }
  
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 8px rgba(13, 110, 253, 0.25);
  }
</style>

{% endblock %}
