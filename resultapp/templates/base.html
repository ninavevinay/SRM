<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #4a6fa5 0%, #2c5282 100%);
            --secondary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --footer-bg: #1a202c;
            --nav-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #2d3748;
        }

        /* Navbar Styling */
        .navbar {
            background: var(--primary-gradient) !important;
            box-shadow: var(--nav-shadow);
            padding: 0.8rem 0;
            transition: var(--transition-smooth);
            border-bottom: 3px solid rgba(255, 255, 255, 0.1);
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.8rem;
            color: white !important;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
        }

        .navbar-brand:hover {
            transform: translateY(-2px);
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.3);
        }

        .navbar-brand i {
            font-size: 1.6rem;
            color: #ffd700;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .navbar-nav {
            gap: 1rem;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.9) !important;
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            padding: 0.5rem 1rem !important;
            border-radius: 8px;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: #ffd700;
            transition: var(--transition-smooth);
            transform: translateX(-50%);
            border-radius: 3px;
        }

        .nav-link:hover {
            color: white !important;
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .nav-link:hover::before {
            width: 80%;
        }

        .nav-link.active {
            color: white !important;
            background: rgba(255, 255, 255, 0.15);
        }

        .nav-link.active::before {
            width: 80%;
            background: #ffd700;
        }

        /* Navbar Toggler */
        .navbar-toggler {
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 0.5rem;
            transition: var(--transition-smooth);
        }

        .navbar-toggler:hover {
            border-color: #ffd700;
            transform: rotate(90deg);
        }

        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28255, 255, 255, 0.9%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }

        /* Main Content */
        .main-content {
            flex: 1;
        }

        /* Footer Styling */
        footer {
            background: var(--footer-bg);
            color: #cbd5e0;
            padding: 2.5rem 0 !important;
            margin-top: auto;
            border-top: 4px solid #4a6fa5;
            position: relative;
            overflow: hidden;
        }

        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--secondary-gradient);
        }

        footer p {
            font-size: 0.95rem;
            margin-bottom: 0;
            color: #a0aec0;
            font-weight: 500;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .footer-links a {
            color: #90cdf4;
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .footer-links a:hover {
            color: #ffd700;
            transform: translateY(-2px);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .navbar-nav {
                background: rgba(26, 32, 44, 0.95);
                padding: 1rem;
                border-radius: 12px;
                margin-top: 1rem;
                backdrop-filter: blur(10px);
            }
            
            .nav-link {
                text-align: center;
                padding: 0.75rem !important;
            }
            
            .footer-links {
                flex-direction: column;
                gap: 1rem;
                align-items: center;
            }
        }

        /* Animation Classes */
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in {
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #4a6fa5, #2c5282);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #3b5998, #1e3a8a);
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-lg sticky-top">
        <div class="container">
            <a class="navbar-brand slide-in" href="{% url 'index' %}">
                <i class="fas fa-graduation-cap"></i>
                <span class="brand-text">SRMS</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto text-uppercase fade-in">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'index' %}active{% endif %}" href="{% url 'index' %}">
                            <i class="fas fa-home me-1"></i>Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'search_result' %}active{% endif %}" href="{% url 'search_result' %}">
                            <i class="fas fa-search me-1"></i>Student Result
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'admin_login' %}active{% endif %}" href="{% url 'admin_login' %}">
                            <i class="fas fa-user-shield me-1"></i>Admin
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content fade-in">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="py-4 text-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <p class="mb-3">&copy; 2025 Student Result Management System. All rights reserved.</p>
                    <div class="footer-links">
                        <a href="#">
                            <i class="fas fa-shield-alt"></i>Privacy Policy
                        </a>
                        <a href="#">
                            <i class="fas fa-file-contract"></i>Terms of Service
                        </a>
                        <a href="#">
                            <i class="fas fa-envelope"></i>Contact Support
                        </a>
                        <a href="#">
                            <i class="fas fa-question-circle"></i>Help Center
                        </a>
                    </div>
                    <div class="mt-4">
                        <small class="text-muted">
                            <i class="fas fa-info-circle me-1"></i>
                            Version 2.0 | Designed for academic institutions
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Add active class based on current page
        document.addEventListener('DOMContentLoaded', function() {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link');
            
            navLinks.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('active');
                }
            });
            
            // Add animation to navbar on scroll
            window.addEventListener('scroll', function() {
                const navbar = document.querySelector('.navbar');
                if (window.scrollY > 50) {
                    navbar.style.padding = '0.5rem 0';
                    navbar.style.boxShadow = '0 4px 20px rgba(0, 0, 0, 0.15)';
                } else {
                    navbar.style.padding = '0.8rem 0';
                    navbar.style.boxShadow = '0 4px 20px rgba(0, 0, 0, 0.1)';
                }
            });
        });
    </script>
</body>
</html>
